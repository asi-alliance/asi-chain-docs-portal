<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Roboto Mono', 'Consolas', monospace">
  <defs>
    <style>
      .bg { fill: #1b1b1f; }
      .app-bg { fill: #7c3aed; }
      .app-text { fill: #fff; font-size: 15px; font-weight: 700; }
      .layer-bg { fill: #2a2a2e; stroke: #3a3a3e; }
      .layer-title { fill: #a0a0a8; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
      .mod-bg { fill: #333338; stroke: #4a4a4e; }
      .mod-text { fill: #d4d4d8; font-size: 12px; }
      .arrow-line { stroke: #555; stroke-width: 1.5; }
      .arrow-head { fill: #555; }
      .dash-line { stroke: #444; stroke-width: 1.2; stroke-dasharray: 6 4; }
      .dash-label { fill: #666; font-size: 11px; }

      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .app-bg { fill: #7c3aed; }
        .layer-bg { fill: #f4f4f5; stroke: #e4e4e7; }
        .layer-title { fill: #71717a; }
        .mod-bg { fill: #fff; stroke: #e4e4e7; }
        .mod-text { fill: #27272a; }
        .arrow-line { stroke: #a1a1aa; }
        .arrow-head { fill: #a1a1aa; }
        .dash-line { stroke: #d4d4d8; }
        .dash-label { fill: #a1a1aa; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" class="bg"/>

  <!-- Your Application pill -->
  <rect x="350" y="20" width="200" height="40" rx="20" class="app-bg"/>
  <text x="450" y="46" text-anchor="middle" class="app-text">Your Application</text>

  <!-- Arrow down from App -->
  <line x1="450" y1="60" x2="450" y2="90" class="arrow-line"/>
  <polygon points="445,87 450,95 455,87" class="arrow-head"/>

  <!-- ===== Services column ===== -->
  <rect x="30" y="100" width="270" height="400" rx="10" stroke-width="1" class="layer-bg"/>
  <text x="165" y="125" text-anchor="middle" class="layer-title">Services</text>

  <rect x="50" y="140" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="161" text-anchor="middle" class="mod-text">WalletsService</text>

  <rect x="50" y="182" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="203" text-anchor="middle" class="mod-text">MnemonicService</text>

  <rect x="50" y="224" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="245" text-anchor="middle" class="mod-text">KeyDerivationService</text>

  <rect x="50" y="266" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="287" text-anchor="middle" class="mod-text">KeysManager</text>

  <rect x="50" y="308" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="329" text-anchor="middle" class="mod-text">CryptoService</text>

  <rect x="50" y="350" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="371" text-anchor="middle" class="mod-text">SignerService</text>

  <rect x="50" y="392" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="413" text-anchor="middle" class="mod-text">AssetsService</text>

  <rect x="50" y="434" width="230" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="165" y="455" text-anchor="middle" class="mod-text">DeployResubmitter</text>

  <!-- ===== Domains column ===== -->
  <rect x="320" y="100" width="250" height="400" rx="10" stroke-width="1" class="layer-bg"/>
  <text x="445" y="125" text-anchor="middle" class="layer-title">Domains</text>

  <rect x="340" y="140" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="161" text-anchor="middle" class="mod-text">Wallet</text>

  <rect x="340" y="182" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="203" text-anchor="middle" class="mod-text">Vault</text>

  <rect x="340" y="224" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="245" text-anchor="middle" class="mod-text">BlockchainGateway</text>

  <rect x="340" y="266" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="287" text-anchor="middle" class="mod-text">EncryptedRecord</text>

  <rect x="340" y="308" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="329" text-anchor="middle" class="mod-text">Asset</text>

  <rect x="340" y="350" width="210" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="445" y="371" text-anchor="middle" class="mod-text">BrowserStorage</text>

  <!-- ===== Utilities column ===== -->
  <rect x="590" y="100" width="280" height="400" rx="10" stroke-width="1" class="layer-bg"/>
  <text x="730" y="125" text-anchor="middle" class="layer-title">Utilities</text>

  <rect x="610" y="140" width="240" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="730" y="161" text-anchor="middle" class="mod-text">Codec</text>

  <rect x="610" y="182" width="240" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="730" y="203" text-anchor="middle" class="mod-text">Functions</text>

  <rect x="610" y="224" width="240" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="730" y="245" text-anchor="middle" class="mod-text">Validators</text>

  <rect x="610" y="266" width="240" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="730" y="287" text-anchor="middle" class="mod-text">Constants</text>

  <rect x="610" y="308" width="240" height="32" rx="6" stroke-width="1" class="mod-bg"/>
  <text x="730" y="329" text-anchor="middle" class="mod-text">Polyfills</text>

  <!-- Arrows from App to columns -->
  <line x1="390" y1="60" x2="165" y2="98" class="arrow-line"/>
  <polygon points="163,93 165,101 170,94" class="arrow-head"/>

  <line x1="450" y1="60" x2="445" y2="98" class="arrow-line"/>
  <polygon points="440,95 445,103 450,95" class="arrow-head"/>

  <line x1="510" y1="60" x2="730" y2="98" class="arrow-line"/>
  <polygon points="727,93 730,101 735,94" class="arrow-head"/>

  <!-- Dashed arrows between columns -->
  <line x1="300" y1="300" x2="320" y2="300" class="dash-line"/>
  <text x="310" y="292" text-anchor="middle" class="dash-label">uses</text>

  <line x1="570" y1="300" x2="590" y2="300" class="dash-line"/>
  <text x="580" y="292" text-anchor="middle" class="dash-label">uses</text>
</svg>
